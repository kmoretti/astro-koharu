<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 448 153">
  <defs>
    <linearGradient id="logoGrad" x1="44" y1="76" x2="404" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D63965"/>
      <stop offset="50%" stop-color="#E76E78"/>
      <stop offset="100%" stop-color="#D63965"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="224" y1="10" x2="224" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF87A8"/>
      <stop offset="100%" stop-color="#D63965"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 装饰星星（保留原版风格） -->
  <g transform="translate(224, 18)" fill="url(#sparkleGrad)" filter="url(#glow)">
    <!-- 主星 -->
    <path d="M0,-12 C1.5,-5 5,-1.5 12,0 C5,1.5 1.5,5 0,12 C-1.5,5 -5,1.5 -12,0 C-5,-1.5 -1.5,-5 0,-12Z"/>
    <!-- 小光点 -->
    <circle cx="0" cy="-16" r="2" opacity="0.6"/>
    <circle cx="16" cy="0" r="1.5" opacity="0.4"/>
    <circle cx="0" cy="16" r="1.5" opacity="0.4"/>
    <circle cx="-16" cy="0" r="1.5" opacity="0.4"/>
  </g>

  <!-- 喵洛阁 文字 -->
  <g font-family="'STKaiti','KaiTi','Noto Serif SC','Source Han Serif SC','AR PL KaitiM GB','方正楷体','华文楷体',serif" font-weight="700" fill="url(#logoGrad)">
    <!-- 喵 -->
    <text x="80" y="108" text-anchor="middle" font-size="90" letter-spacing="4">喵</text>
    <!-- 洛 -->
    <text x="224" y="108" text-anchor="middle" font-size="90" letter-spacing="4">洛</text>
    <!-- 阁 -->
    <text x="368" y="108" text-anchor="middle" font-size="90" letter-spacing="4">阁</text>
  </g>

  <!-- 底部装饰线 -->
  <line x1="60" y1="126" x2="388" y2="126" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  
  <!-- 左右装饰小点 -->
  <circle cx="50" cy="126" r="2.5" fill="#E76E78" opacity="0.5"/>
  <circle cx="398" cy="126" r="2.5" fill="#E76E78" opacity="0.5"/>
</svg>
